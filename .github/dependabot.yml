version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: "monthly"
    labels: ["dependencies", "github_actions"]

  # Maintain dependencies for npm (root)
  - package-ecosystem: "npm"
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: "monthly"
    labels: ["dependencies", "javascript"]

  # Maintain dependencies for npm (packages/files-sdk)
  - package-ecosystem: "npm"
    directory: "/packages/files-sdk"
    open-pull-requests-limit: 10
    schedule:
      interval: "monthly"
    labels: ["dependencies", "javascript"]

  # Maintain dependencies for npm (apps/web)
  - package-ecosystem: "npm"
    directory: "/apps/web"
    open-pull-requests-limit: 10
    schedule:
      interval: "monthly"
    labels: ["dependencies", "javascript"]
